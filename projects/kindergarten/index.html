<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kindergarten</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0b0d10;
      color: #f5f7fa;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,.14), transparent 30%),
        radial-gradient(circle at bottom right, rgba(13,110,253,.10), transparent 25%),
        #0b0d10;
    }
    .box {
      max-width: 760px;
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }
    .badge-soft {
      display: inline-block;
      padding: .5rem .9rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.1);
      background: rgba(255,255,255,.04);
      color: #cbd5e1;
      margin-bottom: 1rem;
    }
    .muted { color: #94a3b8; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="box">
      <div class="badge-soft">Demo Project</div>
      <h1 class="display-5 fw-bold mb-3">Kindergarten</h1>
      <p class="lead muted mb-4">Демо-страница проекта детсада. Можно заменить на свою настоящую верстку.</p>
      <div class="d-flex flex-wrap gap-3">
        <a href="../../index.html" class="btn btn-light">← Назад в портфолио</a>
        <a href="#" class="btn btn-outline-info">Твоя кнопка</a>
      </div>
    </div>
  </section>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
